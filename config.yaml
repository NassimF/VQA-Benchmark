data:
  raw_dir: "data/raw"
  videos_dir: "data/raw/videos"
  transcripts_dir: "data/transcripts"
  chunks_dir: "data/chunks"
  frame_captions_dir: "data/frame_captions"
  qa_pairs_dir: "data/qa_pairs"
  benchmark_dir: "data/benchmark"
  metadata_file: "data/raw/metadata.json"

embedding:
  model: "sentence-transformers/all-MiniLM-L6-v2"
  device: "cuda"  # change to "cpu" if no GPU

retrieval:
  top_k: 4
  k_values: [1, 3, 5]
  distance_metric: "cosine"
  iou_threshold: 0.3

vector_db:
  path: "./chroma_db"
  transcript_only_collection: "lecture_transcript_only"
  transcript_frames_collection: "lecture_transcript_plus_frames"

chunking:
  window_seconds: 45
  overlap_seconds: 10  # stride = 35s

frame_extraction:
  interval_seconds: 15  # 3 frames/chunk avg; covers slide transitions and whiteboard build-up within each 45s window

frame_captioner:
  model: "Qwen/Qwen2-VL-7B-Instruct"
  device: "cuda"
  max_new_tokens: 128

generator:
  model: "gpt-4o-mini"  # options: "utsa-llama", "gpt-4o-mini", "claude-haiku"
  temperature: 0.1
  max_tokens: 512
  citation_format: "[{video_id} @ {start_mm}:{start_ss} to {end_mm}:{end_ss}]"

qa_generation:
  model: "claude-sonnet-4-6"  # Anthropic API — key from ANTHROPIC_API_KEY in .env
  questions_per_lecture: 15
  target_accepted: 12

qa_review:
  primary_model: "claude-sonnet-4-6"
  c1_crosscheck_model: "gpt-4o"
  temperature: 0.0
  floor_accepted: 10
  discard_threshold: 0  # no lecture discarded — all 60 must appear in benchmark
  max_retries: 1
  min_span_gap_seconds: 70

evaluator:
  judge_1_model: "claude-sonnet-4-6"
  judge_2_model: "gpt-4o"
  iou_hit_threshold: 0.3
  output_path: "data/benchmark/evaluation_results.json"

lvlm:
  oracle_window_seconds: 120  # ±120s centered on hop start time (EduVidQA Section 5.3)
  models:
    qwen2-vl-7b:
      hub_id: "Qwen/Qwen2-VL-7B-Instruct"
      frames_per_window: 30
      max_new_tokens: 512
    video-llava-7b:
      hub_id: "LanguageBind/Video-LLaVA-7B-hf"
      frames_per_window: 8
      max_new_tokens: 512
    mplug-owl3-8b:
      hub_id: "mPLUG/mPLUG-Owl3-7B-241101"
      frames_per_window: 30
      max_new_tokens: 512
    llava-13b:
      hub_id: "llava-hf/llava-1.5-13b-hf"
      frames_per_window: 3
      max_frames_total: 6  # LLaVA-1.5 context: 4096 tokens; 576 tokens/image → max 6 images
      max_new_tokens: 512
